<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dragon Shield Wall Parts Quote</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #181818;
      --muted: #65686f;
      --line: #d9dadd;
      --surface: #ffffff;
      --page: #f5f6f7;
      --accent: #bd4635;
      --accent-soft: #fff0eb;
      --teal: #0c7f85;
      --teal-soft: #e8f6f6;
      --warn: #9a5a00;
      --warn-soft: #fff4db;
      --shadow: 0 18px 45px rgba(24, 24, 24, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    .topbar {
      margin-bottom: 18px;
    }

    .brand {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.5vw, 2.35rem);
      line-height: 1.05;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      overflow-wrap: anywhere;
    }

    .button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 780;
      box-shadow: 0 4px 12px rgba(24, 24, 24, 0.05);
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(189, 70, 53, 0.22);
    }

    .button:focus-visible,
    .color-select-button:focus-visible,
    .qty-button:focus-visible,
    .remove-color:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(12, 127, 133, 0.28);
      outline-offset: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(340px, 0.78fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .sku-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      overflow: hidden;
    }

    .section {
      padding: 18px;
    }

    .section + .section {
      border-top: 1px solid var(--line);
    }

    .sku-list {
      display: grid;
      gap: 14px;
    }

    .sku-card {
      position: relative;
      overflow: visible;
      box-shadow: 0 10px 26px rgba(24, 24, 24, 0.06);
    }

    .sku-card:focus-within {
      z-index: 30;
    }

    .sku-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(210px, 0.45fr);
      gap: 0;
      border-radius: inherit;
    }

    .sku-main {
      padding: 16px;
      border-right: 1px solid var(--line);
    }

    .sku-preview-pane {
      display: grid;
      grid-template-rows: minmax(190px, 1fr) auto;
      background: #fbfbfc;
    }

    .sku-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .sku-title h2 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      border-radius: 999px;
      padding: 0 9px;
      background: var(--teal-soft);
      color: #056368;
      font-size: 0.74rem;
      font-weight: 850;
      white-space: nowrap;
    }

    .sku-meta {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .color-picker {
      display: grid;
      gap: 10px;
    }

    .picker-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .picker-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .color-select {
      position: relative;
      min-width: 0;
    }

    .color-select-button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 5px 34px 5px 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      text-align: left;
      font-weight: 780;
      position: relative;
    }

    .color-select-button::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 14px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: translateY(-65%) rotate(45deg);
      transition: transform 140ms ease;
      pointer-events: none;
    }

    .color-select-button[aria-expanded="true"]::after {
      transform: translateY(-35%) rotate(225deg);
    }

    .color-select-value,
    .color-option {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .color-select-value .swatch,
    .color-option .swatch {
      width: 28px;
      height: 28px;
      border-radius: 7px;
    }

    .color-select-text,
    .color-option-text {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .color-select-text strong,
    .color-select-text span,
    .color-option-text strong,
    .color-option-text span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .color-select-text strong,
    .color-option-text strong {
      color: var(--ink);
      line-height: 1.1;
    }

    .color-select-text span,
    .color-option-text span {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 780;
      line-height: 1.1;
      text-transform: none;
    }

    .color-menu {
      position: absolute;
      z-index: 20;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      max-height: min(300px, 58vh);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 6px;
      box-shadow: 0 16px 34px rgba(24, 24, 24, 0.16);
    }

    .color-menu[hidden] {
      display: none;
    }

    .color-group + .color-group {
      border-top: 1px solid var(--line);
      margin-top: 6px;
      padding-top: 6px;
    }

    .color-group-title {
      padding: 6px 8px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .color-option {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding: 6px 8px;
      text-align: left;
    }

    .color-option:hover,
    .color-option.active {
      background: var(--teal-soft);
    }

    .color-option:disabled {
      opacity: 0.42;
    }

    .selected-color-list {
      display: grid;
      gap: 8px;
    }

    .selected-color-row {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 8px;
    }

    .color-info {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      min-width: 0;
    }

    .swatch {
      width: 34px;
      height: 34px;
      border: 2px solid rgba(24, 24, 24, 0.14);
      border-radius: 8px;
      background: var(--swatch);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .swatch.light {
      border-color: rgba(24, 24, 24, 0.2);
      background:
        linear-gradient(45deg, transparent 46%, rgba(24, 24, 24, 0.13) 48%, rgba(24, 24, 24, 0.13) 52%, transparent 54%),
        var(--swatch);
    }

    .color-name {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .color-name strong {
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .color-name span {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .qty {
      display: grid;
      grid-template-columns: 38px 64px 38px;
      gap: 6px;
      align-items: center;
    }

    .qty-button {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font-size: 1.18rem;
      line-height: 1;
      font-weight: 850;
    }

    .remove-color {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      font-weight: 900;
      line-height: 1;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 10px;
      font-weight: 780;
    }

    select {
      appearance: none;
      background:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%) calc(100% - 17px) 50% / 7px 7px no-repeat,
        linear-gradient(135deg, var(--muted) 50%, transparent 50%) calc(100% - 12px) 50% / 7px 7px no-repeat,
        #ffffff;
      padding-right: 32px;
    }

    .qty input {
      text-align: center;
      padding: 0 4px;
    }

    label,
    .field-label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    input[type="color"] {
      width: 68px;
      height: 42px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .preview-wrap {
      display: grid;
      align-items: center;
      justify-items: center;
      padding: 14px 12px 4px;
      min-height: 205px;
      overflow: hidden;
    }

    .mesh-preview {
      width: min(100%, 260px);
      aspect-ratio: 900 / 620;
      position: relative;
    }

    .mesh-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .selected-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 14px 13px;
      align-items: center;
      min-height: 38px;
    }

    .mini-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 27px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 8px;
      background: #ffffff;
      color: var(--ink);
      font-size: 0.76rem;
      font-weight: 800;
      max-width: 100%;
    }

    .mini-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(24, 24, 24, 0.18);
      background: var(--dot);
      flex: 0 0 auto;
    }

    .sku-totals {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid var(--line);
    }

    .sku-total {
      display: grid;
      gap: 3px;
      padding: 11px 12px;
      min-width: 0;
    }

    .sku-total + .sku-total {
      border-left: 1px solid var(--line);
    }

    .sku-total span,
    .metric span,
    .breakdown-heading {
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .sku-total strong {
      font-size: 1.05rem;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .summary {
      position: sticky;
      top: 16px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      min-height: 82px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric strong {
      font-size: clamp(1.2rem, 3vw, 1.72rem);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .metric.total {
      grid-column: 1 / -1;
      background: var(--teal-soft);
      border-color: rgba(12, 127, 133, 0.34);
    }

    .metric.total strong {
      color: #056368;
      font-size: clamp(1.95rem, 6vw, 2.8rem);
    }

    .breakdown-list {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .breakdown-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
    }

    .breakdown-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .breakdown-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-weight: 850;
    }

    .breakdown-value {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .breakdown-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 760;
      line-height: 1.3;
    }

    .meter {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: #e7e8ea;
      margin-top: 9px;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--teal);
      transition: width 160ms ease, background 160ms ease;
    }

    .meter-fill.warn {
      background: var(--warn);
    }

    .small-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .notice {
      display: none;
      border: 1px solid var(--warn);
      border-radius: 8px;
      background: var(--warn-soft);
      color: #5e3600;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-weight: 760;
      line-height: 1.35;
    }

    .notice.show {
      display: block;
    }

    .notice strong {
      color: #4a2b00;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--muted);
      background: #fbfbfc;
      font-weight: 720;
      line-height: 1.35;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .summary {
        position: static;
      }
    }

    @media (max-width: 740px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .sku-grid {
        grid-template-columns: 1fr;
      }

      .sku-main {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 12px;
      }

      .sku-preview-pane {
        grid-template-rows: minmax(165px, auto) auto;
      }

      .picker-row {
        grid-template-columns: 1fr;
      }

      .selected-color-row {
        grid-template-columns: minmax(0, 1fr) 44px;
        gap: 9px;
        padding: 9px;
      }

      .selected-color-row .color-info {
        grid-column: 1 / -1;
      }

      .qty {
        grid-column: 1;
        width: 100%;
        grid-template-columns: 44px minmax(80px, 1fr) 44px;
      }

      .qty-button {
        width: 44px;
      }

      .remove-color {
        grid-column: 2;
        width: 44px;
        height: 44px;
      }

    }

    @media (max-width: 430px) {
      .shell {
        width: calc(100% - 14px);
        padding-top: 10px;
      }

      h1 {
        font-size: 1.45rem;
      }

      .subtitle {
        font-size: 0.88rem;
      }

      .section {
        padding: 12px;
      }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .metric {
        min-height: 72px;
        padding: 10px;
      }

      .metric.total strong {
        font-size: 2rem;
      }

      .preview-wrap {
        min-height: 154px;
        padding: 10px 8px 2px;
      }

      .mesh-preview {
        width: min(100%, 230px);
      }

      .breakdown-top {
        grid-template-columns: 1fr;
      }

      .breakdown-value {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Dragon Shield Wall Parts Quote</h1>
        <p class="subtitle">Panel kits priced by printed weight</p>
      </div>
    </header>

    <div class="layout">
      <section class="sku-list" id="skuList" aria-label="Panel kit choices"></section>

      <aside class="panel summary">
        <div class="section">
          <div class="summary-grid">
            <div class="metric">
              <span>Total grams</span>
              <strong id="totalWeight">0 g</strong>
            </div>
            <div class="metric">
              <span>Total kits</span>
              <strong id="totalKits">0</strong>
            </div>
            <div class="metric total">
              <span>Estimated price</span>
              <strong id="totalPrice">$0.00</strong>
            </div>
          </div>
          <p class="small-note">Pricing updates by color and printed weight.</p>
        </div>
        <div class="section">
          <div class="breakdown-heading">Material by color</div>
          <div class="breakdown-list" id="colorBreakdown"></div>
        </div>
        <div class="section">
          <div class="notice" id="materialNotice"></div>
          <div class="notice" id="leadNotice"></div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const CONFIG = {
      baseRatePerGram: 0.05,
      specialRatePerGram: 0.03,
      specialCharge: 20,
      materialWarningGrams: 900,
      quoteLabel: "Dragon Shield Wall Parts"
    };

    // Bambu Lab filament colors from official store selectors and hex-code tables, checked 2026-06-30.
    const colors = [
      { id: "jade_white", name: "Ivory White", code: "11100", value: "#FFFFFF", material: "PLA Matte", standard: true },
      { id: "beige", name: "Beige", code: "10201", value: "#F7E6DE", standard: false },
      { id: "light_gray", name: "Light Gray", code: "10104", value: "#D1D3D5", standard: false },
      { id: "silver", name: "Silver", code: "10102", value: "#A6A9AA", standard: false },
      { id: "gray", name: "Gray", code: "10103", value: "#8E9089", standard: false },
      { id: "magenta", name: "Magenta", code: "10202", value: "#EC008C", standard: true },
      { id: "pink", name: "Pink", code: "10203", value: "#F55A74", standard: false },
      { id: "hot_pink", name: "Hot Pink", code: "10204", value: "#F5547C", standard: false },
      { id: "orange", name: "Orange", code: "10300", value: "#FF6A13", standard: false },
      { id: "pumpkin_orange", name: "Pumpkin Orange", code: "10301", value: "#FF9016", standard: false },
      { id: "gold", name: "Gold", code: "10401", value: "#E4BD68", standard: false },
      { id: "sunflower_yellow", name: "Sunflower Yellow", code: "10402", value: "#FEC600", standard: false },
      { id: "yellow", name: "Yellow", code: "10400", value: "#F4EE2A", standard: true },
      { id: "bright_green", name: "Bright Green", code: "10503", value: "#BECF00", standard: false },
      { id: "bambu_green", name: "Bambu Green", code: "10501", value: "#00AE42", standard: false },
      { id: "mistletoe_green", name: "Mistletoe Green", code: "10502", value: "#3F8E43", standard: false },
      { id: "glow_green", name: "Glow Green", code: "15500", value: "#A1FFAC", material: "PLA Glow", standard: true },
      { id: "bronze", name: "Bronze", code: "10801", value: "#847D48", standard: false },
      { id: "cocoa_brown", name: "Cocoa Brown", code: "10802", value: "#6F5034", standard: false },
      { id: "brown", name: "Brown", code: "10800", value: "#9D432C", standard: false },
      { id: "maroon_red", name: "Maroon Red", code: "10205", value: "#9D2235", standard: false },
      { id: "red", name: "Red", code: "10200", value: "#C12E1F", standard: true },
      { id: "turquoise", name: "Turquoise", code: "10605", value: "#00B1B7", standard: false },
      { id: "cyan", name: "Cyan", code: "10603", value: "#0086D6", standard: true },
      { id: "blue", name: "Blue", code: "10601", value: "#0A2989", standard: false },
      { id: "cobalt_blue", name: "Cobalt Blue", code: "10604", value: "#0056B8", standard: false },
      { id: "purple", name: "Purple", code: "10700", value: "#5E43B7", standard: false },

    const previewImages = {};

    const money = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD"
    });

    const el = {
      skuList: document.getElementById("skuList"),
      colorBreakdown: document.getElementById("colorBreakdown"),
      materialNotice: document.getElementById("materialNotice"),
      leadNotice: document.getElementById("leadNotice"),
      totalWeight: document.getElementById("totalWeight"),
      totalKits: document.getElementById("totalKits"),
      totalPrice: document.getElementById("totalPrice")
    };

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function clampQuantity(value) {
      const number = Number.parseInt(value, 10);
      if (!Number.isFinite(number) || number < 0) return 0;
      return Math.min(number, 999);
    }

    function grams(value) {
      const rounded = Math.round(value * 100) / 100;
      return `${rounded.toLocaleString("en-US", { maximumFractionDigits: 2 })} g`;
    }

    function colorById(colorId) {
      return colors.find((color) => color.id === colorId) || colors[0];
    }

    function colorLabel(color) {
      return color.standard ? "main color" : "custom color";
    }

    function materialLabel(color) {
      return color.material || "PLA Basic";
    }

    function lightClassForColor(color) {
      return color.id === "jade_white" ? " light" : "";
    }

    function hexToRgb(value) {
      const hex = value.replace("#", "");
      return {
        r: Number.parseInt(hex.slice(0, 2), 16),
        g: Number.parseInt(hex.slice(2, 4), 16),
        b: Number.parseInt(hex.slice(4, 6), 16)
      };
    }

    function previewColor(value) {
      const rgb = hexToRgb(value);
      const luminance = (rgb.r * 0.2126) + (rgb.g * 0.7152) + (rgb.b * 0.0722);
      const whiteMix = Math.max(0, (70 - luminance) / 255);
      return {
        r: Math.round(rgb.r + (255 - rgb.r) * whiteMix),
        g: Math.round(rgb.g + (255 - rgb.g) * whiteMix),
        b: Math.round(rgb.b + (255 - rgb.b) * whiteMix)
      };
    }

    function shadePreviewColor(rgb, brightness) {
      const midpoint = 0.62;
      if (brightness >= midpoint) {
        const mix = (brightness - midpoint) / (1 - midpoint);
        return {
          r: Math.round(rgb.r + (255 - rgb.r) * mix),
          g: Math.round(rgb.g + (255 - rgb.g) * mix),
          b: Math.round(rgb.b + (255 - rgb.b) * mix)
        };
      }
      const scale = brightness / midpoint;
      return {
        r: Math.round(rgb.r * scale),
        g: Math.round(rgb.g * scale),
        b: Math.round(rgb.b * scale)
      };
    }

    function buildUsablePixelOrder(image, width, height) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(image, 0, 0, width, height);
      const data = context.getImageData(0, 0, width, height).data;
      const totalPixels = width * height;
      let usableCount = 0;

      for (let pixel = 0; pixel < totalPixels; pixel += 1) {
        if (data[(pixel * 4) + 3] > 8) usableCount += 1;
      }

      const entries = new Int32Array(usableCount);
      let entryIndex = 0;
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const pixel = (y * width) + x;
          if (data[(pixel * 4) + 3] <= 8) continue;
          const diagonal = x + (height - y);
          entries[entryIndex] = (diagonal * totalPixels) + pixel;
          entryIndex += 1;
        }
      }

      entries.sort();
      const usablePixels = new Int32Array(usableCount);
      for (let index = 0; index < usableCount; index += 1) {
        usablePixels[index] = entries[index] % totalPixels;
      }
      return usablePixels;
    }

    function previewSegmentsForSku(sku) {
      const items = selectedColorsForSku(sku);
      const source = items.length ? items : [{ color: colors[0], qty: 1 }];
      const totalShares = source.reduce((sum, item) => sum + Math.max(1, item.qty), 0);
      let cursor = 0;
      return source.map((item) => {
        cursor += Math.max(1, item.qty) / totalShares;
        return {
          end: cursor,
          rgb: previewColor(item.color.value)
        };
      });
    }

    function selectedColorsForSku(sku) {
      return colors
        .map((color) => ({ color, qty: sku.qtyByColor[color.id] || 0 }))
        .filter((item) => item.qty > 0);
    }

    function skuQuantity(sku) {
      return Object.values(sku.qtyByColor).reduce((sum, qty) => sum + qty, 0);
    }

    function skuWeight(sku) {
      return skuQuantity(sku) * sku.weight;
    }

    function colorWeight(colorId) {
      return skus.reduce((sum, sku) => sum + (sku.qtyByColor[colorId] || 0) * sku.weight, 0);
    }

    function skuColorWeight(sku, colorId) {
      return (sku.qtyByColor[colorId] || 0) * sku.weight;
    }

    function colorQuantity(colorId) {
      return skus.reduce((sum, sku) => sum + (sku.qtyByColor[colorId] || 0), 0);
    }

    function hasSpecialPricing(color, weight) {
      return !color.standard || weight > CONFIG.materialWarningGrams;
    }

    function colorPriceForWeight(color, weight) {
      if (weight <= 0) return 0;
      if (hasSpecialPricing(color, weight)) {
        return CONFIG.specialCharge + (weight * CONFIG.specialRatePerGram);
      }
      return weight * CONFIG.baseRatePerGram;
    }

    function colorPrice(colorId) {
      const color = colorById(colorId);
      return colorPriceForWeight(color, colorWeight(colorId));
    }

    function pricingLabel(color, weight) {
      if (!color.standard) return "Custom color pricing";
      if (weight > CONFIG.materialWarningGrams) return "900g+ color pricing";
      return "Main color pricing";
    }

    function skuSubtotal(sku) {
      return colors.reduce((sum, color) => {
        const totalColorWeight = colorWeight(color.id);
        const skuWeightForColor = skuColorWeight(sku, color.id);
        if (!totalColorWeight || !skuWeightForColor) return sum;
        return sum + (colorPrice(color.id) * (skuWeightForColor / totalColorWeight));
      }, 0);
    }

    function totals() {
      const totalWeight = skus.reduce((sum, sku) => sum + skuWeight(sku), 0);
      const totalKits = skus.reduce((sum, sku) => sum + skuQuantity(sku), 0);
      const totalPrice = colors.reduce((sum, color) => sum + colorPrice(color.id), 0);
      return {
        totalWeight,
        totalKits,
        totalPrice
      };
    }

    function initPreviewImages() {
      Object.entries(PREVIEW_ASSETS).forEach(([skuId, assets]) => {
        previewImages[skuId] = {
          base: new Image()
        };
        Object.values(previewImages[skuId]).forEach((image) => {
          image.addEventListener("load", drawAllPreviews);
        });
        previewImages[skuId].base.src = assets.base;
      });
    }

    function selectedColorSet(sku) {
      return new Set(Object.entries(sku.qtyByColor)
        .filter(([, qty]) => qty > 0)
        .map(([colorId]) => colorId));
    }

    function availableColorCount(sku) {
      return colors.filter((color) => !sku.qtyByColor[color.id]).length;
    }

    function pickerColor(sku) {
      const selected = selectedColorSet(sku);
      if (sku.pendingColorId && !selected.has(sku.pendingColorId)) {
        return colorById(sku.pendingColorId);
      }
      return colors.find((color) => !selected.has(color.id)) || null;
    }

    function colorOptionMarkup(sku, color) {
      const selected = selectedColorSet(sku);
      const disabled = selected.has(color.id);
      const active = pickerColor(sku)?.id === color.id;
      return `
        <button class="color-option${active ? " active" : ""}" type="button" role="option" aria-selected="${active ? "true" : "false"}" data-action="choose-color" data-sku="${sku.id}" data-color="${color.id}" ${disabled ? "disabled" : ""}>
          <span class="swatch${lightClassForColor(color)}" style="--swatch: ${color.value}"></span>
          <span class="color-option-text">
            <strong>${escapeHtml(color.name)}</strong>
            <span>${escapeHtml(materialLabel(color))} ${escapeHtml(color.code)} - ${colorLabel(color)}</span>
          </span>
        </button>
      `;
    }

    function colorMenuMarkup(sku) {
      return `
        <div class="color-menu" data-role="color-menu" data-sku="${sku.id}" role="listbox" hidden>
          <div class="color-group">
            <div class="color-group-title">Main colors</div>
            ${colors.filter((color) => color.standard).map((color) => colorOptionMarkup(sku, color)).join("")}
          </div>
          <div class="color-group">
            <div class="color-group-title">Custom colors</div>
            ${colors.filter((color) => !color.standard).map((color) => colorOptionMarkup(sku, color)).join("")}
          </div>
        </div>
      `;
    }

    function colorPickerMarkup(sku) {
      const color = pickerColor(sku);
      if (!color) {
        return `
          <div class="picker-field">
            <span class="field-label">Bambu color</span>
            <button class="color-select-button" type="button" disabled>All colors added</button>
          </div>
        `;
      }
      return `
        <div class="picker-field">
          <span class="field-label">Bambu color</span>
          <div class="color-select" data-role="color-picker" data-sku="${sku.id}">
            <button class="color-select-button" type="button" data-action="toggle-color-menu" data-sku="${sku.id}" aria-haspopup="listbox" aria-expanded="false">
              <span class="color-select-value">
                <span class="swatch${lightClassForColor(color)}" style="--swatch: ${color.value}"></span>
                <span class="color-select-text">
                  <strong>${escapeHtml(color.name)}</strong>
                  <span>${escapeHtml(materialLabel(color))} ${escapeHtml(color.code)} - ${colorLabel(color)}</span>
                </span>
              </span>
            </button>
            ${colorMenuMarkup(sku)}
          </div>
        </div>
      `;
    }

    function closeColorMenus(exceptSkuId = "") {
      document.querySelectorAll("[data-role='color-menu']").forEach((menu) => {
        if (exceptSkuId && menu.dataset.sku === exceptSkuId) return;
        menu.hidden = true;
        const button = document.querySelector(`[data-action="toggle-color-menu"][data-sku="${menu.dataset.sku}"]`);
        if (button) button.setAttribute("aria-expanded", "false");
      });
    }

    function toggleColorMenu(skuId) {
      const menu = document.querySelector(`[data-role="color-menu"][data-sku="${skuId}"]`);
      const button = document.querySelector(`[data-action="toggle-color-menu"][data-sku="${skuId}"]`);
      if (!menu || !button) return;
      const willOpen = menu.hidden;
      closeColorMenus(skuId);
      menu.hidden = !willOpen;
      button.setAttribute("aria-expanded", String(willOpen));
    }

    function selectedColorRowsMarkup(sku) {
      const items = selectedColorsForSku(sku);
      if (!items.length) {
        return '<div class="empty">Add one or more Bambu colors for this kit.</div>';
      }
      return items.map(({ color, qty }) => {
        return `
          <div class="selected-color-row" data-sku="${sku.id}" data-color="${color.id}">
            <div class="color-info">
              <span class="swatch${lightClassForColor(color)}" style="--swatch: ${color.value}"></span>
              <div class="color-name">
                <strong>${escapeHtml(color.name)}</strong>
                <span>${escapeHtml(materialLabel(color))} ${escapeHtml(color.code)} - ${colorLabel(color)}</span>
              </div>
            </div>
            <div class="qty" aria-label="${escapeHtml(sku.name)} ${escapeHtml(color.name)} quantity">
              <button class="qty-button" type="button" data-action="decrement" data-sku="${sku.id}" data-color="${color.id}" title="Decrease ${escapeHtml(color.name)} ${escapeHtml(sku.name)}">-</button>
              <input type="number" min="0" max="999" step="1" value="${qty}" data-role="quantity" data-sku="${sku.id}" data-color="${color.id}" inputmode="numeric" aria-label="${escapeHtml(sku.name)} ${escapeHtml(color.name)} quantity">
              <button class="qty-button" type="button" data-action="increment" data-sku="${sku.id}" data-color="${color.id}" title="Increase ${escapeHtml(color.name)} ${escapeHtml(sku.name)}">+</button>
            </div>
            <button class="remove-color" type="button" data-action="remove-color" data-sku="${sku.id}" data-color="${color.id}" title="Remove ${escapeHtml(color.name)}">x</button>
          </div>
        `;
      }).join("");
    }

    function previewMarkup(sku) {
      const items = selectedColorsForSku(sku);
      return `
        <div class="preview-wrap">
          <div class="mesh-preview">
            <canvas class="mesh-canvas" width="900" height="620" data-preview-canvas data-sku="${sku.id}" aria-label="${escapeHtml(sku.name)} STL preview"></canvas>
          </div>
        </div>
        <div class="selected-colors">
          ${items.length ? items.map(({ color, qty }) => `
            <span class="mini-chip">
              <span class="mini-dot" style="--dot: ${color.value}"></span>
              ${escapeHtml(color.name)} x${qty}
            </span>
          `).join("") : '<span class="small-note">No kits selected</span>'}
        </div>
      `;
    }

    function renderSkus() {
      el.skuList.innerHTML = skus.map((sku) => `
        <article class="sku-card" data-sku="${sku.id}">
          <div class="sku-grid">
            <div class="sku-main">
              <div class="sku-title">
                <h2>${escapeHtml(sku.name)}</h2>
                <span class="badge">${grams(sku.weight)} each</span>
              </div>
              <p class="sku-meta">${sku.parts.map(escapeHtml).join(" - ")}</p>
              <div class="color-picker">
                <div class="picker-row">
                  ${colorPickerMarkup(sku)}
                  <button class="button" type="button" data-action="add-color" data-sku="${sku.id}" ${availableColorCount(sku) ? "" : "disabled"}>Add color</button>
                </div>
                <div class="selected-color-list" data-role="selected-colors" data-sku="${sku.id}">
                  ${selectedColorRowsMarkup(sku)}
                </div>
              </div>
            </div>
            <div class="sku-preview-pane">
              <div data-role="preview" data-sku="${sku.id}">${previewMarkup(sku)}</div>
              <div class="sku-totals">
                <div class="sku-total">
                  <span>Kits</span>
                  <strong data-role="sku-kits" data-sku="${sku.id}">${skuQuantity(sku)}</strong>
                </div>
                <div class="sku-total">
                  <span>Subtotal</span>
                  <strong data-role="sku-total" data-sku="${sku.id}">${money.format(skuSubtotal(sku))}</strong>
                </div>
              </div>
            </div>
          </div>
        </article>
      `).join("");
    }

    function drawPreview(sku) {
      const canvas = document.querySelector(`[data-preview-canvas][data-sku="${sku.id}"]`);
      if (!canvas) return;
      const context = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      const assets = previewImages[sku.id];
      context.clearRect(0, 0, width, height);
      if (!assets || !assets.base.complete || !assets.base.naturalWidth) return;

      const segments = previewSegmentsForSku(sku);
      const baseCanvas = document.createElement("canvas");
      baseCanvas.width = width;
      baseCanvas.height = height;
      const baseContext = baseCanvas.getContext("2d", { willReadFrequently: true });
      baseContext.drawImage(assets.base, 0, 0, width, height);
      const image = baseContext.getImageData(0, 0, width, height);
      const data = image.data;
      if (!assets.usablePixels || assets.usablePixelsWidth !== width || assets.usablePixelsHeight !== height) {
        assets.usablePixels = buildUsablePixelOrder(assets.base, width, height);
        assets.usablePixelsWidth = width;
        assets.usablePixelsHeight = height;
      }

      const usablePixels = assets.usablePixels;
      let segmentIndex = 0;
      for (let orderIndex = 0; orderIndex < usablePixels.length; orderIndex += 1) {
        const progress = orderIndex / usablePixels.length;
        while (segmentIndex < segments.length - 1 && progress >= segments[segmentIndex].end) {
          segmentIndex += 1;
        }
        const pixel = usablePixels[orderIndex] * 4;
        const alpha = data[pixel + 3];
        if (!alpha) continue;
        const brightness = data[pixel] / 255;
        const color = shadePreviewColor(segments[segmentIndex].rgb, brightness);
        data[pixel] = color.r;
        data[pixel + 1] = color.g;
        data[pixel + 2] = color.b;
      }

      context.putImageData(image, 0, 0);
    }

    function drawAllPreviews() {
      skus.forEach(drawPreview);
    }

    function selectedColorRows() {
      return colors
        .map((color) => ({
          color,
          kits: colorQuantity(color.id),
          weight: colorWeight(color.id)
        }))
        .filter((row) => row.kits > 0);
    }

    function renderBreakdown() {
      const rows = selectedColorRows();
      if (!rows.length) {
        el.colorBreakdown.innerHTML = '<div class="empty">Select quantities to see material use by color.</div>';
        return;
      }
      el.colorBreakdown.innerHTML = rows.map(({ color, kits, weight }) => {
        const percent = Math.min(100, (weight / CONFIG.materialWarningGrams) * 100);
        const warn = weight > CONFIG.materialWarningGrams;
        const price = colorPriceForWeight(color, weight);
        return `
          <div class="breakdown-row">
            <div class="breakdown-top">
              <div class="breakdown-name">
                <span class="swatch${lightClassForColor(color)}" style="--swatch: ${color.value}"></span>
                <span>${escapeHtml(color.name)}</span>
              </div>
              <div class="breakdown-value">${kits} kits - ${grams(weight)} - ${money.format(price)}</div>
            </div>
            <div class="breakdown-note">${escapeHtml(pricingLabel(color, weight))}</div>
            <div class="meter" aria-label="${escapeHtml(color.name)} material use">
              <div class="meter-fill${warn ? " warn" : ""}" style="width: ${percent}%"></div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderNotices() {
      const rows = selectedColorRows();
      const overLimit = rows.filter((row) => row.color.standard && row.weight > CONFIG.materialWarningGrams);

      if (overLimit.length) {
        const names = overLimit.map((row) => `${row.color.name} (${grams(row.weight)})`).join(", ");
        el.materialNotice.innerHTML = `<strong>Timing notice:</strong> ${escapeHtml(names)} is above ${grams(CONFIG.materialWarningGrams)} in one color and may take longer if more material has to be ordered.`;
      } else {
        el.materialNotice.innerHTML = "";
      }
      el.materialNotice.classList.toggle("show", overLimit.length > 0);
      el.leadNotice.innerHTML = "";
      el.leadNotice.classList.remove("show");
    }

    function render() {
      const total = totals();
      el.totalWeight.textContent = grams(total.totalWeight);
      el.totalKits.textContent = String(total.totalKits);
      el.totalPrice.textContent = money.format(total.totalPrice);
      skus.forEach((sku) => {
        const preview = document.querySelector(`[data-role="preview"][data-sku="${sku.id}"]`);
        const kits = document.querySelector(`[data-role="sku-kits"][data-sku="${sku.id}"]`);
        const subtotal = document.querySelector(`[data-role="sku-total"][data-sku="${sku.id}"]`);
        if (preview) preview.innerHTML = previewMarkup(sku);
        if (kits) kits.textContent = String(skuQuantity(sku));
        if (subtotal) subtotal.textContent = money.format(skuSubtotal(sku));
      });
      renderBreakdown();
      renderNotices();
      updateUrl();
      drawAllPreviews();
    }

    function setQuantity(skuId, colorId, value) {
      const sku = skus.find((item) => item.id === skuId);
      if (!sku) return;
      const nextQuantity = clampQuantity(value);
      sku.qtyByColor[colorId] = nextQuantity;
      if (nextQuantity === 0) {
        renderSkus();
        render();
        return;
      }
      const input = document.querySelector(`[data-role="quantity"][data-sku="${skuId}"][data-color="${colorId}"]`);
      if (input) input.value = nextQuantity;
      render();
    }

    function updateUrl() {
      const params = new URLSearchParams();
      skus.forEach((sku) => {
        colors.forEach((color) => {
          const qty = sku.qtyByColor[color.id] || 0;
          if (qty > 0) params.set(`${sku.id}_${color.id}`, String(qty));
        });
      });
      const nextUrl = `${window.location.pathname}?${params.toString()}`;
      window.history.replaceState(null, "", nextUrl);
    }

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);

      skus.forEach((sku) => {
        colors.forEach((color) => {
          const key = `${sku.id}_${color.id}`;
          if (params.has(key)) sku.qtyByColor[color.id] = clampQuantity(params.get(key));
        });
      });

      // Reads links made by the first version of this calculator.
      if (params.has("mounted") || params.has("plain")) {
        const oldColorValue = (params.get("color") || colors[0].value).toLowerCase();
        const oldColorName = (params.get("colorName") || "").toLowerCase();
        const oldColor = colors.find((color) => color.value.toLowerCase() === oldColorValue)
          || colors.find((color) => color.name.toLowerCase() === oldColorName)
          || (oldColorName.includes("signal red") ? colorById("red") : null)
          || (oldColorName.includes("white") ? colorById("jade_white") : colors[0]);
        skus.forEach((sku) => {
          if (params.has(sku.id)) sku.qtyByColor[oldColor.id] = clampQuantity(params.get(sku.id));
        });
      }
    }

    initPreviewImages();
    loadFromUrl();
    renderSkus();
    render();

    el.skuList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const sku = skus.find((item) => item.id === button.dataset.sku);
      if (!sku) return;
      if (button.dataset.action === "toggle-color-menu") {
        toggleColorMenu(sku.id);
        return;
      }
      if (button.dataset.action === "choose-color") {
        if (sku.qtyByColor[button.dataset.color]) return;
        sku.pendingColorId = button.dataset.color;
        renderSkus();
        render();
        return;
      }
      if (button.dataset.action === "add-color") {
        const color = pickerColor(sku);
        if (!color) return;
        sku.qtyByColor[color.id] = sku.qtyByColor[color.id] || 1;
        sku.pendingColorId = colors.find((item) => !sku.qtyByColor[item.id])?.id || "";
        renderSkus();
        render();
        return;
      }
      if (button.dataset.action === "remove-color") {
        sku.qtyByColor[button.dataset.color] = 0;
        renderSkus();
        render();
        return;
      }
      const current = sku.qtyByColor[button.dataset.color] || 0;
      const delta = button.dataset.action === "increment" ? 1 : -1;
      setQuantity(sku.id, button.dataset.color, current + delta);
    });

    el.skuList.addEventListener("input", (event) => {
      const input = event.target.closest("[data-role='quantity']");
      if (!input) return;
      setQuantity(input.dataset.sku, input.dataset.color, input.value);
    });

    document.addEventListener("click", (event) => {
      if (event.target.closest(".color-select")) return;
      closeColorMenus();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeColorMenus();
    });

  </script>
</body>
</html>
